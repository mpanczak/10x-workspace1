name: Backend Deploy (Production)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to deploy — should already be validated via a backend-preview.yml run'
        required: true
        default: 'main'

# Manual-promotion by design (tech-stack.md: ci_default_flow: manual-promotion).
# Gated by the "production" GitHub Environment — configure required reviewers
# on that Environment in repo Settings so this job pauses for approval before
# running. This is the only workflow in this repo allowed to touch production.
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Apply pending migrations to production D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply slipstream-db --remote

      - name: Deploy to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --minify --env=""
