name: Backend Preview

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-preview.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-preview.yml'

# Non-destructive by design: this workflow only uploads a Worker Version
# (its own testable *.workers.dev preview URL, zero live traffic) and applies
# migrations to the preview D1 — a disposable database per Phase 2's own
# convention. It never touches production. Promoting to production is a
# separate, manually-triggered, reviewer-gated workflow (backend-deploy.yml).
jobs:
  preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Apply pending migrations to preview D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply slipstream-db-preview --remote --env preview

      - name: Upload preview version (no traffic switch)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler versions upload --env preview
